name: Release Publish

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Release tag (e.g. v1.0.0)'
        required: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.x"

      - name: Run publish script
        run: python scripts/publish.py

      - name: Create release and attach madugong.md
        if: github.event_name == 'workflow_dispatch'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ github.event.inputs.tag_name }}"
          gh release create "$TAG" publish/madugong.md \
            --title "$TAG" --generate-notes

      - name: Attach madugong.md to existing release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            publish/madugong.md \
            --clobber

      - name: Update release branch
        run: |
          TAG="${{ github.event.release.tag_name || github.event.inputs.tag_name || 'manual' }}"
          cp -r publish/madugong-perspective /tmp/madugong-release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout release || git checkout --orphan release
          git rm -rf . || true
          cp -r /tmp/madugong-release/* .
          git add -A
          git commit -m "release: $TAG"
          git push origin release --force
