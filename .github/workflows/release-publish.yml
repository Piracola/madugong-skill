name: Release Publish

on:
  release:
    types: [created]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Run publish script
        run: python scripts/publish.py

      - name: Attach madugong.md to release
        if: github.event_name == 'release'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            publish/madugong.md \
            --clobber

      - name: Update release branch
        run: |
          TAG="${{ github.event.release.tag_name || 'manual' }}"
          cp -r publish/madugong-perspective /tmp/madugong-release
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout release || git checkout --orphan release
          git rm -rf . || true
          cp -r /tmp/madugong-release/* .
          git add -A
          git commit -m "release: $TAG"
          git push origin release --force
